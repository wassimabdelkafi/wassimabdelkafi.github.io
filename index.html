<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wassim Abdelkafi | Génie civil</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Segoe UI',sans-serif;
      background:#eef2f7;
      color:#1f2937;
      line-height:1.7;
    }

    header{

      background:
      linear-gradient(rgba(15,23,42,0.78), rgba(15,23,42,0.78)),
      url('banniere-genie-civil.png') center/cover no-repeat;

      color:white;
      padding:120px 30px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    header::before{
      content:"";
      position:absolute;
      width:500px;
      height:500px;
      background:rgba(255,255,255,0.05);
      border-radius:50%;
      top:-200px;
      right:-150px;
    }

    header h1{
      font-size:58px;
      margin-bottom:18px;
      position:relative;
      z-index:1;
      text-shadow:0 4px 12px rgba(0,0,0,0.45);
    }

    header p{
      font-size:22px;
      max-width:1100px;
      margin:auto;
      position:relative;
      z-index:1;
      text-shadow:0 2px 8px rgba(0,0,0,0.4);
    }

    nav{
      background:white;
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:20px;
      padding:18px;
      position:sticky;
      top:0;
      z-index:100;
      box-shadow:0 4px 15px rgba(0,0,0,0.08);
    }

    nav a{
      color:#1e3a8a;
      text-decoration:none;
      font-weight:600;
      transition:0.3s;
    }

    nav a:hover{
      color:#2563eb;
      transform:translateY(-2px);
    }

    section{
      max-width:1200px;
      margin:45px auto;
      padding:45px;
      background:white;
      border-radius:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.07);
    }

    h2{
      color:#1e3a8a;
      margin-bottom:30px;
      font-size:34px;
      border-left:6px solid #2563eb;
      padding-left:18px;
    }

    h3{
      color:#111827;
      margin-top:40px;
      margin-bottom:15px;
      font-size:26px;
    }

    p{
      margin-top:14px;
      font-size:18px;
    }

    ul{
      margin-top:15px;
      margin-left:25px;
    }

    ul li{
      margin-bottom:14px;
      font-size:17px;
    }

    .hero-buttons{
      margin-top:35px;
      position:relative;
      z-index:1;
    }

    .btn{
      display:inline-block;
      padding:14px 24px;
      border-radius:14px;
      background:#2563eb;
      color:white;
      text-decoration:none;
      margin:8px;
      font-weight:bold;
      transition:0.3s;
      box-shadow:0 6px 18px rgba(37,99,235,0.3);
    }

    .btn:hover{
      transform:translateY(-3px);
    }

    .btn.secondary{
      background:#111827;
      box-shadow:0 6px 18px rgba(17,24,39,0.25);
    }

    .skills{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:20px;
    }

    .skills span{
      background:linear-gradient(135deg,#dbeafe,#eff6ff);
      color:#1e3a8a;
      padding:12px 18px;
      border-radius:40px;
      font-weight:600;
      font-size:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
    }

    #presentation{
      background:linear-gradient(180deg,#ffffff,#f8fbff);
    }

    #presentation p{
      margin-bottom:34px;
      line-height:2.1;
      text-align:justify;
      font-size:18px;
    }

    footer{
      background:#0f172a;
      color:white;
      text-align:center;
      padding:35px;
      margin-top:50px;
      font-size:16px;
    }

    @media (max-width:768px){

      header h1{
        font-size:38px;
      }

      header p{
        font-size:18px;
      }

      section{
        padding:30px;
      }

      nav{
        gap:12px;
      }

    }

  </style>

</head>

<body>

  <header>

    <h1>Wassim Abdelkafi</h1>

    <p>
      Diplômé en génie civil | Coordination technique | Suivi de chantier |
      Contrôle qualité | Gestion de projet | OIQ en cours d’étude
    </p>

    <p style="margin-top:18px;font-size:18px;">
      Localisation : Sherbrooke, Québec, Canada
    </p>

    <div class="hero-buttons">

      <a class="btn" href="#contact">
        Me contacter
      </a>

      <a class="btn secondary"
         href="CV_Wassim_Abdelkafi.pdf"
         target="_blank">

         Télécharger mon CV
      </a>

      <a class="btn secondary"
         href="Lettre_Presentation_Wassim_Abdelkafi.pdf"
         target="_blank">

         Télécharger ma lettre de présentation
      </a>

    </div>

  </header>

</body>
</html>
